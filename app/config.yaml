agent:
  machine_id: ecs-uploader
  lab_id: sdl1
  scan_interval_seconds: 60
  stable_window_seconds: 300
  timezone: America/Toronto

watch:
  session_roots:
    - path: "/mnt/lab1/sessions"
      profile: battery_session

profiles:
  battery_session:
    required_markers:
      - "session_summary.json"
    ignore_patterns:
      - "*.tmp"
      - "*.lock"
    metadata_files:
      - "metadata.json"

upload:
  s3_bucket: "battery-etl-dev-data"
  s3_region: "ca-central-1"
  s3_prefix: ""
  step_function_arn: ""
  max_retries: 10
  initial_backoff_seconds: 30

storage:
  local_state_db: "/data/state/upload_state.db"
  manifest_cache_dir: "/data/state/manifests"
  log_dir: "/data/logs"
