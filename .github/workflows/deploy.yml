name: Deploy Lab Data Uploader

on:
  pull_request:
    branches: [main, test, prod]
    paths:
      - 'platform/**'
      - 'app/**'
      - '.github/**'
  push:
    branches: [main, test, prod]
    paths:
      - 'platform/**'
      - 'app/**'
      - '.github/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install & Run ASH
        run: |
          pip install uv
          git clone --depth 1 https://github.com/awslabs/automated-security-helper.git /tmp/ash
          uv tool install /tmp/ash
          mkdir -p /tmp/ash-results
          ash scan --source-dir . --output-dir /tmp/ash-results --mode local || true
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-security-report
          path: /tmp/ash-results/reports/
          retention-days: 30
      - name: Post Summary
        if: always()
        run: |
          if [ -f /tmp/ash-results/reports/ash.summary.txt ]; then
            echo '## 🔒 ASH Security Scan' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/ash-results/reports/ash.summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
      environment: ${{ steps.env.outputs.environment }}
      tfvars: ${{ steps.env.outputs.tfvars }}
      app_name: ${{ steps.env.outputs.app_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "infra=true" >> $GITHUB_OUTPUT
            echo "app=true" >> $GITHUB_OUTPUT
          else
            INFRA=false; APP=false
            echo "$CHANGED" | grep -q '^platform/' && INFRA=true
            echo "$CHANGED" | grep -q '^app/' && APP=true
            echo "infra=$INFRA" >> $GITHUB_OUTPUT
            echo "app=$APP" >> $GITHUB_OUTPUT
          fi

      - name: Determine Environment
        id: env
        run: |
          REF="${{ github.base_ref || github.ref_name }}"
          case "$REF" in
            prod) TFVARS="prod" ;;
            test) TFVARS="test" ;;
            *)    TFVARS="dev"  ;;
          esac
          echo "tfvars=$TFVARS" >> $GITHUB_OUTPUT
          ENV=$(grep '^environment ' platform/vars/${TFVARS}.tfvars | awk -F'"' '{print $2}')
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          APP=$(grep '^app_name ' platform/vars/${TFVARS}.tfvars | awk -F'"' '{print $2}')
          echo "app_name=$APP" >> $GITHUB_OUTPUT

  infrastructure:
    runs-on: ubuntu-latest
    needs: changes
    environment: ${{ needs.changes.outputs.tfvars }}
    if: needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Generate token from GitHub App
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AC_APP_ID }}
          private-key: ${{ secrets.AC_APP_PRIVATE_KEY }}
          owner: AccelerationConsortium
          repositories: infrastructure-modules
      - uses: actions/checkout@v4
        with:
          repository: AccelerationConsortium/infrastructure-modules
          ref: main
          path: .modules/infrastructure-modules
          token: ${{ steps.app-token.outputs.token }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ca-central-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init & Apply
        env:
          APP: ${{ needs.changes.outputs.app_name }}
        run: |
          BUCKET=$(aws ssm get-parameter --name /shared/terraform/state-bucket --region ca-central-1 --query 'Parameter.Value' --output text)
          cp platform/vars/${{ needs.changes.outputs.tfvars }}.tfvars .modules/infrastructure-modules/modules/specialized/python-backend/
          cd .modules/infrastructure-modules/modules/specialized/python-backend
          terraform init -backend-config="bucket=$BUCKET" -backend-config="key=${APP}/${{ needs.changes.outputs.tfvars }}/terraform.tfstate"
          if [ "${{ github.event_name }}" = "push" ]; then
            terraform apply -auto-approve -var-file=${{ needs.changes.outputs.tfvars }}.tfvars
          else
            terraform plan -var-file=${{ needs.changes.outputs.tfvars }}.tfvars -no-color
          fi

  deploy-app:
    runs-on: ubuntu-latest
    needs: [changes, infrastructure]
    environment: ${{ needs.changes.outputs.tfvars }}
    if: always() && !failure() && !cancelled() && needs.changes.outputs.app == 'true' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ca-central-1
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Deploy
        env:
          APP: ${{ needs.changes.outputs.app_name }}
          ENV: ${{ needs.changes.outputs.environment }}
        run: |
          REPO=$(aws ecr describe-repositories --repository-names ${APP}-${ENV} --query 'repositories[0].repositoryUri' --output text)
          cd app
          docker build --platform linux/amd64 -t ${APP}:${{ github.sha }} .
          docker tag ${APP}:${{ github.sha }} ${REPO}:latest
          docker push ${REPO}:latest
          CLUSTER=$(aws ssm get-parameter --name /shared/ecs/cluster-name --region ca-central-1 --query 'Parameter.Value' --output text)
          aws ecs update-service --cluster $CLUSTER --service ${APP}-${ENV} --force-new-deployment --region ca-central-1
